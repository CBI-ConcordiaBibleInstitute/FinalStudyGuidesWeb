# Keeps the Supabase project from pausing due to inactivity.
#
# Free-tier Supabase projects are paused after ~7 days with no database
# activity. This workflow runs a real (tiny) query against the database on a
# schedule, which counts as activity and keeps the project awake.
#
# It queries public.site_settings (which has a public-read RLS policy), so the
# anon key is enough — no service-role secret is exposed here.
#
# SETUP (one time): add two repository secrets under
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#     SUPABASE_URL       = your https://<project-ref>.supabase.co  (no trailing slash)
#     SUPABASE_ANON_KEY  = your anon/public key
name: Keep Supabase Alive

on:
  schedule:
    # Runs twice a week (Mon & Thu, 06:00 UTC) — max gap ~3-4 days, well inside
    # the 7-day pause window. Times are UTC and may be delayed by GitHub at peak.
    - cron: "0 6 * * 1,4"
  workflow_dispatch: {} # allows running it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to register activity
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY repository secret."
            exit 1
          fi
          echo "Pinging Supabase REST API…"
          # --fail makes curl exit non-zero on HTTP errors, so a paused/broken
          # project surfaces as a failed run (and GitHub emails you).
          curl --fail --silent --show-error \
            "${SUPABASE_URL}/rest/v1/site_settings?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          echo ""
          echo "Done — Supabase activity registered."
