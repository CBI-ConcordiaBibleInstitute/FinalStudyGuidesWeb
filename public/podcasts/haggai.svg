<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Haggai series cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="hsl(286, 72%, 28%)"/>
      <stop offset="0.55" stop-color="hsl(292, 78%, 18%)"/>
      <stop offset="1" stop-color="hsl(296, 82%, 11%)"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.34" r="0.7">
      <stop offset="0" stop-color="hsl(286, 90%, 80%)" stop-opacity="0.34"/>
      <stop offset="1" stop-color="hsl(286, 90%, 80%)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect x="40" y="40" width="1120" height="595" rx="20" fill="none" stroke="hsl(286, 90%, 80%)" stroke-width="2" opacity="0.45"/>
  <rect x="52" y="52" width="1096" height="571" rx="14" fill="none" stroke="hsl(286, 90%, 80%)" stroke-width="1" opacity="0.22"/>
  <circle cx="600" cy="250" r="118" fill="none" stroke="hsl(286, 90%, 80%)" stroke-width="3" opacity="0.8"/>
  <circle cx="600" cy="250" r="100" fill="hsl(286, 90%, 80%)" opacity="0.12"/>
  <text x="600" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700"
        fill="hsl(286, 90%, 80%)" text-anchor="middle" dominant-baseline="central">H</text>
  <text x="600" y="455" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700"
        fill="#F4F2FF" text-anchor="middle">Haggai</text>
  <text x="600" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic"
        fill="hsl(286, 90%, 80%)" text-anchor="middle">Rebuild the house</text>
  <text x="600" y="585" font-family="Arial, Helvetica, sans-serif" font-size="22" letter-spacing="6"
        fill="#F4F2FF" fill-opacity="0.7" text-anchor="middle">OLD TESTAMENT</text>
</svg>
