<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Top 40 Texts series cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#5c0d18"/>
      <stop offset="0.55" stop-color="#3d0710"/>
      <stop offset="1"    stop-color="#1f0308"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#e8c87a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e8c87a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d896"/>
      <stop offset="1" stop-color="#b8975a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Ornate double frame -->
  <rect x="60" y="60" width="1080" height="1080" rx="4" fill="none"
        stroke="#c9a86b" stroke-width="3" opacity="0.9"/>
  <rect x="80" y="80" width="1040" height="1040" rx="2" fill="none"
        stroke="#c9a86b" stroke-width="1" opacity="0.45"/>

  <!-- Corner ornaments -->
  <g stroke="#e8c87a" stroke-width="3" fill="none" opacity="0.75">
    <path d="M 80 160 L 80 80 L 160 80"/>
    <path d="M 1040 80 L 1120 80 L 1120 160"/>
    <path d="M 80 1040 L 80 1120 L 160 1120"/>
    <path d="M 1120 1040 L 1120 1120 L 1040 1120"/>
  </g>
  <g fill="#e8c87a" opacity="0.7">
    <circle cx="80" cy="80" r="7"/>
    <circle cx="1120" cy="80" r="7"/>
    <circle cx="80" cy="1120" r="7"/>
    <circle cx="1120" cy="1120" r="7"/>
  </g>

  <!-- Top eyebrow -->
  <text x="600" y="240" font-family="Arial, Helvetica, sans-serif" font-size="22"
        letter-spacing="10" fill="#e8c87a" text-anchor="middle" opacity="0.85">
    CHRIST IN EVERY WORD
  </text>

  <!-- Flourish under eyebrow -->
  <g transform="translate(600,290)" opacity="0.7">
    <line x1="-200" y1="0" x2="-30" y2="0" stroke="#c9a86b" stroke-width="1"/>
    <line x1="30"  y1="0" x2="200" y2="0" stroke="#c9a86b" stroke-width="1"/>
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#e8c87a" stroke-width="2.5"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#e8c87a" stroke-width="2.5"/>
  </g>

  <!-- "40" centerpiece -->
  <text x="600" y="620" font-family="Georgia, 'Times New Roman', serif" font-size="420"
        font-weight="700" fill="url(#gold)" text-anchor="middle"
        dominant-baseline="central" letter-spacing="-12">40</text>

  <!-- Decorative line under 40 -->
  <line x1="380" y1="810" x2="820" y2="810" stroke="#c9a86b" stroke-width="1" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="900" font-family="Georgia, 'Times New Roman', serif" font-size="80"
        font-weight="700" fill="#F8EFD6" text-anchor="middle" letter-spacing="3">
    TOP 40 TEXTS
  </text>

  <!-- Italic subtitle -->
  <text x="600" y="970" font-family="Georgia, 'Times New Roman', serif" font-size="34"
        font-style="italic" fill="#e8c87a" text-anchor="middle" opacity="0.9">
    The Cornerstone Scriptures
  </text>

  <!-- Bottom label -->
  <text x="600" y="1060" font-family="Arial, Helvetica, sans-serif" font-size="18"
        letter-spacing="12" fill="#F8EFD6" fill-opacity="0.55" text-anchor="middle">
    FEATURED COLLECTION
  </text>
</svg>
